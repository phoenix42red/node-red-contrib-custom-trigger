<script type="text/javascript">
RED.nodes.registerType('custom-trigger',{
    category: 'function',
    color: '#E6E0F8',
    defaults: {
        name: {value:""},
        fieldPath: {value:"payload"},
        mustInclude: {value:""},
        oldMustContain: {value:""},
        useRegex: {value:false},
        pattern: {value:""},
        direction: {value:"Beide"},
        triggerOnFirstMessage: {value:false},
        cooldown: {value:0},
        debug: {value:false}
    },
    inputs:1,
    outputs:1,
    icon: "arrow-in.svg",
    label: function() {
        return this.name || "custom-trigger";
    }
});
</script>

<script type="text/x-red" data-template-name="custom-trigger">
    <div class="form-row">
        <label for="node-input-name">Name</label>
        <input type="text" id="node-input-name">
    </div>

    <div class="form-row">
        <label for="node-input-fieldPath">Feld-Pfad</label>
        <input type="text" id="node-input-fieldPath" placeholder="z.B. data.attributes.tomorrow_valid">
    </div>

    <div class="form-row">
        <label for="node-input-direction">Richtung</label>
        <select id="node-input-direction">
            <option value="Beide">Beide</option>
            <option value="Aus→Ein">Aus→Ein</option>
            <option value="Ein→Aus">Ein→Aus</option>
        </select>
    </div>

    <div class="form-row">
        <label for="node-input-triggerOnFirstMessage">Beim ersten Wert triggern</label>
        <input type="checkbox" id="node-input-triggerOnFirstMessage">
    </div>

    <div class="form-row">
        <label for="node-input-cooldown">Cooldown (Sekunden)</label>
        <input type="number" id="node-input-cooldown">
    </div>

    <div class="form-row">
        <label for="node-input-debug">Debug</label>
        <input type="checkbox" id="node-input-debug">
    </div>
</script>
