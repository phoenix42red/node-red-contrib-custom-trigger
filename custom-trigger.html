<div class="form-row">
    <label for="node-input-name">Name</label>
    <input type="text" id="node-input-name">
</div>
<script type="text/x-red" data-template-name="custom-trigger">
    <div class="form-row">
        <label for="node-input-sensors">Sensoren (Topic)</label>
        <input type="text" id="node-input-sensors" placeholder="Kommagetrennt">
    </div>
    <div class="form-row">
        <label for="node-input-previousMustInclude">Alter Wert muss enthalten</label>
        <input type="text" id="node-input-previousMustInclude" placeholder="z.B. Ein">
    </div>
    <div class="form-row">
        <label for="node-input-mustInclude">Neuer Wert muss enthalten</label>
        <input type="text" id="node-input-mustInclude" placeholder="z.B. Aus">
    </div>
    <div class="form-row">
        <label for="node-input-useRegex">Regex benutzen</label>
        <input type="checkbox" id="node-input-useRegex">
    </div>
    <div class="form-row">
        <label for="node-input-pattern">Regex-Muster</label>
        <input type="text" id="node-input-pattern" placeholder="z.B. ^Ein|Start$">
    </div>
    <div class="form-row">
        <label for="node-input-direction">Richtung</label>
        <select id="node-input-direction">
            <option value="Vorher→Nachher">Vorher → Nachher</option>
            <option value="Beide">Beide Richtungen</option>
        </select>
    </div>
    <div class="form-row">
        <label for="node-input-triggerOnFirstMessage">Trigger bei erster Nachricht</label>
        <input type="checkbox" id="node-input-triggerOnFirstMessage">
    </div>
    <div class="form-row">
        <label for="node-input-cooldown">Cooldown (ms)</label>
        <input type="number" id="node-input-cooldown" placeholder="0">
    </div>
    <div class="form-row">
        <label for="node-input-debug">Debug</label>
        <input type="checkbox" id="node-input-debug">
    </div>
</script>

<script type="text/javascript">
RED.nodes.registerType('custom-trigger',{
    category: 'function',
    color: '#a6bbcf',

    defaults: {
        name: {value:""},
        sensors: {value:""},
        mustInclude: {value:"Ein"},
        useRegex: {value:false},
        pattern: {value:""},
        direction: {value:"Ein→Aus"},
        triggerOnFirstMessage: {value:false},
        cooldown: {value:0},
        debug: {value:false}
    },

    inputs:1,
    outputs:1,
    icon: "switch.png",

    label: function() {
        return this.name || "custom-trigger";
    }
});
</script>

<script type="text/x-red" data-help-name="custom-trigger">
<p>Custom Trigger Node: feuert nur bei Textmatch + gewählter Richtung, prüft alten und neuen Wert. Unterstützt Regex, mehrere Sensoren, Cooldown und Sofort-Trigger.</p>
</script>
